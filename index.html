<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>خزانة الحكمة المعرفية</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.cdnfonts.com/css/sf-pro-display-2');

        :root {
            --tg-bg: var(--telegram-bg-color, #0d1117);
            --tg-sec-bg: var(--telegram-secondary-bg-color, #161b22);
            --tg-text: var(--telegram-text-color, #c9d1d9);
            --tg-hint: var(--telegram-hint-color, #8b949e);
            --tg-link: var(--telegram-link-color, #58a6ff);
            --border-color: #30363d;
            --accent-gold: #ffb703;
            --apple-font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        body {
            font-family: var(--apple-font);
            background-color: var(--tg-bg); 
            color: var(--tg-text); 
            padding: 14px; 
            min-height: 100vh;
            letter-spacing: -0.3px;
            overflow-x: hidden;
        }

        .stats-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            background: var(--tg-sec-bg); padding: 14px; border-radius: 12px;
            border: 1px solid var(--border-color); margin-bottom: 20px; text-align: center;
        }
        .stats-item .num { font-size: 16px; font-weight: 700; color: #f0f6fc; }
        .stats-item .lbl { font-size: 11px; color: var(--tg-hint); margin-top: 3px; }

        .search-wrapper { position: relative; margin-bottom: 12px; }
        .search-input {
            width: 100%; padding: 14px 44px 14px 16px; background-color: var(--tg-sec-bg);
            border: 1px solid var(--border-color); border-radius: 10px; color: #f0f6fc; font-size: 14px; 
            font-family: var(--apple-font); outline: none; transition: border-color 0.2s ease;
        }
        .search-input:focus { border-color: var(--tg-link); }
        .search-wrapper .search-icon { position: absolute; top: 50%; right: 16px; transform: translateY(-50%); color: var(--tg-hint); }

        .tags-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; padding: 0 4px; align-items: center; }
        .tags-lbl { font-size: 11.5px; color: var(--tg-hint); }
        .tag-item { font-size: 11.5px; background: var(--tg-sec-bg); padding: 5px 12px; border-radius: 8px; border: 1px solid var(--border-color); color: var(--tg-link); cursor: pointer; }

        .cats-scroll { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 20px; }
        .cats-scroll::-webkit-scrollbar { display: none; }
        .cat-chip {
            background: var(--tg-sec-bg); border: 1px solid var(--border-color); color: var(--tg-text);
            padding: 8px 14px; border-radius: 8px; font-size: 12.5px; font-weight: 500; white-space: nowrap; cursor: pointer;
        }
        .cat-chip.active { background: var(--tg-link); color: #0d1117; border-color: var(--tg-link); font-weight: 600; }

        .section-box { margin-bottom: 24px; }
        .section-headline { font-size: 12.5px; font-weight: 700; color: var(--tg-hint); margin-bottom: 12px; letter-spacing: 0.3px; }
        .books-list { display: flex; flex-direction: column; }
        
        .book-row {
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
            padding: 12px 4px; border-bottom: 1px solid rgba(48, 54, 61, 0.4);
            animation: iosSlideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .book-row:last-child { border-bottom: none; }
        
        @keyframes iosSlideIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .book-meta-core { display: flex; align-items: center; gap: 12px; overflow: hidden; flex-grow: 1; }
        
        .premium-cover {
            width: 40px; height: 54px; border-radius: 7px; position: relative;
            display: flex; align-items: center; justify-content: center; color: #ffffff;
            font-size: 14px; font-weight: 800; flex-shrink: 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.15);
            overflow: hidden; border: 1px solid rgba(255,255,255,0.05);
        }
        .premium-cover .inner-spine { position: absolute; top: 0; right: 0; width: 3px; height: 100%; background: rgba(0,0,0,0.15); }
        .premium-cover .watermark { position: absolute; bottom: -4px; left: -4px; font-size: 24px; opacity: 0.1; }

        .book-details { display: flex; flex-direction: column; overflow: hidden; }
        .title-text { font-size: 14.5px; font-weight: 700; color: #f0f6fc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .sub-data-row { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--tg-hint); margin-top: 5px; white-space: nowrap; overflow: hidden; }
        .author-text { color: var(--tg-text); font-weight: 500; }
        .bullet-spacer { color: var(--border-color); }
        .star-rating { font-size: 10px; color: var(--accent-gold); display: flex; align-items: center; gap: 2px; }
        
        .btn-download-trigger {
            background-color: rgba(88, 166, 255, 0.1); border: 1px solid rgba(88, 166, 255, 0.2); color: var(--tg-link);
            padding: 8px 14px; border-radius: 8px; display: flex; align-items: center; gap: 6px;
            cursor: pointer; flex-shrink: 0; font-size: 12px; font-weight: 700; font-family: var(--apple-font);
            transition: all 0.2s ease;
        }
        .btn-download-trigger:active { transform: scale(0.95); background-color: rgba(88, 166, 255, 0.18); }
        .btn-download-trigger.working { border-color: var(--tg-hint); color: var(--tg-hint); background: transparent; cursor: not-allowed; }
        .btn-download-trigger.success { border-color: #2ea44f; color: #2ea44f; background: rgba(46, 164, 79, 0.1); }
        .btn-download-trigger.failed { border-color: #ea4a5a; color: #ea4a5a; background: rgba(234, 74, 90, 0.1); }

        .shimmer-bar { height: 52px; border-bottom: 1px solid var(--border-color); animation: pulseLoader 1.4s infinite linear; background: linear-gradient(90deg, var(--tg-bg) 25%, var(--tg-sec-bg) 50%, var(--tg-bg) 75%); background-size: 200% 100%; }
        @keyframes pulseLoader { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .no-data-view { display: none; text-align: center; padding: 40px; color: var(--tg-hint); font-size: 13px; }
    </style>
</head>
<body>

    <div class="stats-grid">
        <div class="stats-item"><div class="num">1,534,821</div><div class="lbl">مخطوط ومصدر</div></div>
        <div class="stats-item"><div class="num">94,105</div><div class="lbl">مؤلف ومحقق</div></div>
        <div class="stats-item"><div class="num">320</div><div class="lbl">تصنيفاً علمياً</div></div>
    </div>

    <div class="search-wrapper">
        <input type="text" id="engineSearch" class="search-input" placeholder="ابحث عن عنوان، مصنف، أو محقق..." autocomplete="off">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
    </div>

    <div class="tags-row" id="quickTags">
        <span class="tags-lbl">شائع:</span>
        <span class="tag-item">منطق المظفر</span>
        <span class="tag-item">نهاية الحكمة</span>
        <span class="tag-item">الأسفار الأربعة</span>
    </div>

    <div class="cats-scroll" id="categoriesBar">
        <div class="cat-chip active" data-cat="all">خزانة الاكتشاف</div>
    </div>

    <div id="panelDiscovery">
        <div class="section-box" id="boxRecommend" style="display: none;">
            <div class="section-headline">مقترحات معرفية وفلسفية مخصصة</div>
            <div class="books-list" id="areaRecommend"></div>
        </div>

        <div class="section-box">
            <div class="section-headline">الأكثر طلباً وتداولاً هذا الأسبوع</div>
            <div id="fallbackLoader" style="display: none; flex-direction: column;">
                <div class="shimmer-bar"></div>
                <div class="shimmer-bar"></div>
                <div class="shimmer-bar"></div>
            </div>
            <div class="books-list" id="areaTrending"></div>
        </div>
    </div>

    <div id="panelSearch" style="display: none;" class="section-box">
        <div class="section-headline">نتائج التحقيق والمطابقة الدقيقة</div>
        <div class="no-data-view" id="viewNoData">
            <i class="fa-solid fa-folder-open" style="font-size: 22px; margin-bottom: 6px; display:block;"></i>
            لم نجد مطابقة دقيقة داخل الفهارس الحالية.
        </div>
        <div class="books-list" id="areaSearchResults"></div>
    </div>

    <script>
        class ServerClient {
            async fetchJson(url, options = {}) {
                const response = await fetch(url, options);
                if (!response.ok) throw new Error(`HTTP_ERR_${response.status}`);
                return await response.json();
            }
        }
        const client = new ServerClient();

        const PALETTES = [
            { gradient: 'linear-gradient(135deg, #1e3c72 0%, #2a5298 100%)', icon: 'fa-scale-balanced' },
            { gradient: 'linear-gradient(135deg, #232526 0%, #414345 100%)', icon: 'fa-scroll' },
            { gradient: 'linear-gradient(135deg, #0f9b0f 0%, #000000 100%)', icon: 'fa-feather-pointed' },
            { gradient: 'linear-gradient(135deg, #4568dc 0%, #b06ab3 100%)', icon: 'fa-atom' }
        ];

        class CentralLibraryEngine {
            constructor(apiClient, telegramInstance) {
                this.api = apiClient;
                this.tg = telegramInstance;
                this.currentQuery = "";
                this.debounceTimer = null;

                if (this.tg && this.tg.ready) {
                    this.tg.ready();
                    this.tg.expand();
                }

                this.locateElements();
                this.initListeners();
            }

            locateElements() {
                this.dom = {
                    input: document.getElementById("engineSearch"),
                    trendingArea: document.getElementById("areaTrending"),
                    recommendArea: document.getElementById("areaRecommend"),
                    recommendBox: document.getElementById("boxRecommend"),
                    loader: document.getElementById("fallbackLoader"),
                    catsBar: document.getElementById("categoriesBar"),
                    discoveryView: document.getElementById("panelDiscovery"),
                    searchView: document.getElementById("panelSearch"),
                    searchArea: document.getElementById("areaSearchResults"),
                    noData: document.getElementById("viewNoData"),
                    quickTags: document.getElementById("quickTags")
                };
            }

            initListeners() {
                this.dom.input.addEventListener("input", () => this.onSearchInput());
                
                document.body.addEventListener("click", (e) => {
                    const btn = e.target.closest('.btn-download-trigger');
                    if (btn) this.dispatchDownloadRequest(btn);

                    const chip = e.target.closest('.cat-chip');
                    if (chip) this.onCategorySelect(chip);

                    const tag = e.target.closest('.tag-item');
                    if (tag) { this.dom.input.value = tag.textContent.trim(); this.onSearchInput(); }
                });
            }

            generateCoverHtml(book) {
                const uniqueStr = String(book.file_id || "9");
                const sum = uniqueStr.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0);
                const choice = PALETTES[Math.abs(sum) % PALETTES.length];
                const letter = (book.title || book.file_name || "ق")[0];
                
                return `
                    <div class="premium-cover" style="background: ${choice.gradient}">
                        <div class="inner-spine"></div>
                        <i class="fa-solid ${choice.icon} watermark"></i>
                        <span>${letter}</span>
                    </div>
                `;
            }

            buildRowNode(book, index) {
                const el = document.createElement("div");
                el.className = "book-row";
                el.style.animationDelay = `${index * 0.02}s`;
                el.innerHTML = `
                    <div class="book-meta-core">
                        ${this.generateCoverHtml(book)}
                        <div class="book-details">
                            <span class="title-text" title="${book.title || book.file_name}">${book.title || book.file_name}</span>
                            <div class="sub-data-row">
                                <span class="author-text">${book.author || 'مصنف مجهول'}</span>
                                <span class="bullet-spacer">•</span>
                                <span>${book.extension || 'PDF'}</span>
                                <span class="bullet-spacer">•</span>
                                <span>${book.size || '3.5 MB'}</span>
                                <span class="bullet-spacer">•</span>
                                <span class="star-rating"><i class="fa-solid fa-star"></i> ${book.rating || '5.0'}</span>
                            </div>
                        </div>
                    </div>
                    <button class="btn-download-trigger" data-id="${book.file_id}">
                        <i class="fa-solid fa-cloud-arrow-down"></i> <span>تحميل</span>
                    </button>
                `;
                return el;
            }

            async syncDashboard() {
                this.dom.loader.style.display = "flex";
                try {
                    const response = await this.api.fetchJson('/api/trending');
                    this.dom.loader.style.display = "none";
                    this.renderDashboard(response.results ? response.results : response);
                } catch (err) {
                    this.dom.loader.style.display = "none";
                    const fallback = localStorage.getItem("lib_dashboard_cache");
                    if (fallback) this.renderDashboard(JSON.parse(fallback));
                }
            }

            renderDashboard(data) {
                if (!data) return;
                localStorage.setItem("lib_dashboard_cache", JSON.stringify(data));

                this.dom.trendingArea.replaceChildren();
                const trending = data.trending || (Array.isArray(data) ? data : []);
                trending.forEach((b, i) => this.dom.trendingArea.appendChild(this.buildRowNode(b, i)));

                if (data.recommendations && data.recommendations.length > 0) {
                    this.dom.recommendBox.style.display = "block";
                    this.dom.recommendArea.replaceChildren();
                    data.recommendations.forEach((b, i) => this.dom.recommendArea.appendChild(this.buildRowNode(b, i)));
                }

                if (this.dom.catsBar.children.length <= 1 && data.categories) {
                    data.categories.forEach(c => {
                        const chip = document.createElement("div");
                        chip.className = "cat-chip"; chip.textContent = c; chip.dataset.cat = c;
                        this.dom.catsBar.appendChild(chip);
                    });
                }
            }

            onSearchInput() {
                this.currentQuery = this.dom.input.value.trim();
                clearTimeout(this.debounceTimer);

                if (this.currentQuery.length === 0) { this.switchToDiscoveryMode(); return; }
                if (this.currentQuery.length < 2) return;

                this.debounceTimer = setTimeout(() => this.runSearchPipeline(), 250);
            }

            async runSearchPipeline() {
                this.dom.discoveryView.style.display = "none";
                this.dom.quickTags.style.display = "none";
                this.dom.searchView.style.display = "block";
                this.dom.viewNoData.style.display = "none";
                this.dom.searchArea.replaceChildren();

                try {
                    const data = await this.api.fetchJson(`/api/search?query=${encodeURIComponent(this.currentQuery)}`);
                    const items = data.results || (Array.isArray(data) ? data : []);
                    if (items.length > 0) {
                        items.forEach((b, i) => this.dom.searchArea.appendChild(this.buildRowNode(b, i)));
                    } else { this.dom.viewNoData.style.display = "block"; }
                } catch (e) { this.dom.viewNoData.style.display = "block"; }
            }

            async dispatchDownloadRequest(btn) {
                if (btn.classList.contains("working")) return;

                const userId = this.tg?.initDataUnsafe?.user?.id;
                if (!userId) {
                    if (this.tg && this.tg.showPopup) {
                        this.tg.showPopup({ title: "تعذّر التحقق", message: "لم نتمكن من التحقق من هويتك داخل تيليجرام.", buttons: [{ type: "ok", text: "حسنًا" }] });
                    } else {
                        alert("تعذّر التحقق من هويتك داخل تيليجرام.");
                    }
                    return;
                }

                btn.className = "btn-download-trigger working";
                btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> <span>جاري البث...</span>`;

                const fileId = btn.dataset.id;
                const originalHtml = `<i class="fa-solid fa-cloud-arrow-down"></i> <span>تحميل</span>`;

                try {
                    const data = await this.api.fetchJson(`/api/download?file_id=${encodeURIComponent(fileId)}&user_id=${encodeURIComponent(userId)}`);

                    if (data && data.success === false) {
                        throw new Error(data.message || "SEND_FAILED");
                    }

                    btn.className = "btn-download-trigger success";
                    btn.innerHTML = `<i class="fa-solid fa-check"></i> <span>في الشات</span>`;

                    if (this.tg && this.tg.showPopup) {
                        this.tg.showPopup({
                            title: "اكتمل البث الرقمي",
                            message: "تم تسليم الطلب بنجاح، ستجد الكتاب مرفوعاً وجاهزاً داخل شات البوت الآن.",
                            buttons: [{ type: "ok", text: "تم" }]
                        });
                    }
                } catch (err) {
                    // تأمين الـ catch وإرجاع الزر لحالته الأصلية مع التنبيه الفعلي بالفشل
                    btn.className = "btn-download-trigger failed";
                    btn.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> <span>فشل الإرسال</span>`;
                    
                    if (this.tg && this.tg.showPopup) {
                        this.tg.showPopup({
                            title: "خلل في المعالجة",
                            message: `لم يتمكن السيرفر من بث الملف. خطأ: ${err.message || 'Unknown'}`,
                            buttons: [{ type: "ok", text: "إغلاق" }]
                        });
                    }
                    
                    // إعادة تهيئة الزر بعد ثانيتين لإتاحة إعادة المحاولة
                    setTimeout(() => {
                        if (btn.classList.contains("failed")) {
                            btn.className = "btn-download-trigger";
                            btn.innerHTML = originalHtml;
                        }
                    }, 2500);
                }
