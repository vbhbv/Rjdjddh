<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>خزانة الحكمة المعرفية - تحديث ميكانيكي كامل</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* استدعاء خطوط نظام Apple الرسمية وتثبيتها بالقوة كخط أساسي للمنصة */
        @import url('https://fonts.cdnfonts.com/css/sf-pro-display-2');

        :root {
            --tg-bg: var(--telegram-bg-color, #0d1117);
            --tg-sec-bg: var(--telegram-secondary-bg-color, #161b22);
            --tg-text: var(--telegram-text-color, #c9d1d9);
            --tg-hint: var(--telegram-hint-color, #8b949e);
            --tg-link: var(--telegram-link-color, #58a6ff);
            --border-color: #30363d;
            --accent-gold: #f25c54;
            --rating-gold: #ffb703;
            --ios-font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: var(--ios-font);
            background-color: var(--tg-bg); color: var(--tg-text); padding: 14px; min-height: 100vh;
            letter-spacing: -0.3px;
        }

        /* لوحة إحصائيات ضخامة المكتبة المعرفية */
        .library-stats-bar {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            background: var(--tg-sec-bg); padding: 14px; border-radius: 12px;
            border: 1px solid var(--border-color); margin-bottom: 20px; text-align: center;
        }
        .stat-item .stat-num { font-size: 16px; font-weight: 700; color: #f0f6fc; }
        .stat-item .stat-lbl { font-size: 11px; color: var(--tg-hint); margin-top: 3px; }

        /* منطقة البحث المركزية */
        .search-area-box { position: relative; margin-bottom: 8px; }
        .search-input-field {
            width: 100%; padding: 15px 46px 15px 16px; background-color: var(--tg-sec-bg);
            border: 1px solid var(--border-color); border-radius: 10px; color: #f0f6fc; font-size: 14.5px; 
            font-family: var(--ios-font); outline: none; transition: border-color 0.2s ease;
        }
        .search-input-field:focus { border-color: var(--tg-link); }
        .search-area-box .search-icon { position: absolute; top: 50%; right: 16px; transform: translateY(-50%); color: var(--tg-hint); }

        /* الكلمات الأكثر بحثاً وتداولاً مسبقاً */
        .trending-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; padding: 0 4px; align-items: center; }
        .trending-label { font-size: 11.5px; color: var(--tg-hint); }
        .tag-pill { font-size: 11.5px; background: var(--tg-sec-bg); padding: 5px 12px; border-radius: 8px; border: 1px solid var(--border-color); color: var(--tg-link); cursor: pointer; }

        /* لوحة الاقتراحات التلقائية (Autocomplete Suggestions) */
        .suggestions-panel {
            background: var(--tg-sec-bg); border: 1px solid var(--border-color); border-radius: 10px;
            margin-bottom: 16px; display: none; overflow: hidden; box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            position: relative; z-index: 10;
        }
        .suggestion-row {
            padding: 14px 16px; display: flex; align-items: center; gap: 12px;
            font-size: 14px; color: #f0f6fc; border-bottom: 1px solid var(--border-color); cursor: pointer;
        }
        .suggestion-row:last-child { border-bottom: none; }
        .suggestion-row i { color: var(--tg-hint); }
        .suggestion-row .matched-prefix { color: var(--tg-link); font-weight: 600; }

        /* شريط التنقل الأفقي المقتضب للتصنيفات الفكرية */
        .chips-nav-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; margin-bottom: 24px; }
        .chips-nav-row::-webkit-scrollbar { display: none; }
        .nav-chip {
            background: var(--tg-sec-bg); border: 1px solid var(--border-color); color: var(--tg-text);
            padding: 8px 14px; border-radius: 8px; font-size: 13px; font-weight: 500; white-space: nowrap; cursor: pointer;
        }
        .nav-chip.active { background: var(--tg-link); color: #0d1117; border-color: var(--tg-link); font-weight: 600; }

        /* بنية الـ Data-Dense Lists (الكثافة العالية للمعلومات) */
        .dense-section { margin-bottom: 26px; }
        .dense-section-title { font-size: 13px; font-weight: 700; color: var(--tg-hint); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .dense-list { display: flex; flex-direction: column; }
        
        /* السطر المعرفي المدمج بعد دمج أغلفتك المصورة المطورة */
        .book-dense-row {
            display: flex; align-items: center; justify-content: space-between; gap: 12px;
            padding: 12px 6px; border-bottom: 1px solid rgba(48, 54, 61, 0.5); 
            animation: iosFadeInUp 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        .book-dense-row:last-child { border-bottom: none; }
        
        @keyframes iosFadeInUp {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .book-core-info { display: flex; align-items: center; gap: 12px; overflow: hidden; flex-grow: 1; }
        
        /* هندسة الغلاف المطور الصغير لعدم إهدار الكثافة */
        .micro-book-cover {
            width: 36px; height: 48px; border-radius: 6px; position: relative;
            display: flex; align-items: center; justify-content: center; color: #fff;
            font-size: 16px; font-weight: bold; flex-shrink: 0; box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .micro-book-cover .cover-bg-icon { position: absolute; bottom: -4px; left: -4px; font-size: 24px; opacity: 0.15; }

        .book-text-meta { display: flex; flex-direction: column; overflow: hidden; }
        .primary-title-row { display: flex; align-items: center; gap: 6px; }
        .b-title { font-size: 14.5px; font-weight: 700; color: #f0f6fc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .secondary-data-row { display: flex; align-items: center; gap: 8px; font-size: 11.5px; color: var(--tg-hint); margin-top: 4px; white-space: nowrap; overflow: hidden; }
        .b-author { color: var(--tg-text); font-weight: 500; }
        .data-separator { color: var(--border-color); }
        .rating-block { font-size: 10px; color: var(--rating-gold); display: flex; align-items: center; gap: 2px; }
        
        /* تعديل زر التحميل ليكون واضحاً، صريحاً ومرئياً للباحث */
        .btn-dense-download {
            background-color: rgba(88, 166, 255, 0.1); border: 1px solid rgba(88, 166, 255, 0.2); color: var(--tg-link);
            padding: 6px 12px; border-radius: 6px; display: flex; align-items: center; gap: 6px;
            cursor: pointer; flex-shrink: 0; font-size: 12px; font-weight: 600; font-family: var(--ios-font);
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn-dense-download:active { transform: scale(0.94); background-color: rgba(88, 166, 255, 0.2); }
        .btn-dense-download.success { border-color: #2ea44f; color: #2ea44f; background: rgba(46, 164, 79, 0.1); }

        .skeleton-row-dense { height: 54px; border-bottom: 1px solid var(--border-color); animation: shimmer 1.5s infinite linear; background: linear-gradient(90deg, var(--tg-bg) 25%, var(--tg-sec-bg) 50%, var(--tg-bg) 75%); background-size: 200% 100%; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        .empty-state { display: none; text-align: center; padding: 40px; color: var(--tg-hint); font-size: 13.5px; }
    </style>
</head>
<body>

    <!-- عدادات الحجم الفعلي للمكتبة الرقمية -->
    <div class="library-stats-bar">
        <div class="stat-item">
            <div class="stat-num">1,534,821</div>
            <div class="stat-lbl">مخطوط ومصدر</div>
        </div>
        <div class="stat-item">
            <div class="stat-num">94,105</div>
            <div class="stat-lbl">مؤلف ومحقق</div>
        </div>
        <div class="stat-item">
            <div class="stat-num">320</div>
            <div class="stat-lbl">تصنيفاً علمياً</div>
        </div>
    </div>

    <!-- حقل البحث المتقدم -->
    <div class="search-area-box">
        <input type="text" id="dbSearch" class="search-input-field" placeholder="ادخل اسم الكتاب، المصنف، أو المحقق..." autocomplete="off">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
    </div>

    <!-- الكلمات الأكثر بحثاً وتداولاً مسبقاً -->
    <div class="trending-tags" id="trendingTags">
        <span class="trending-label">شائع:</span>
        <span class="tag-pill">منطق المظفر</span>
        <span class="tag-pill">نهاية الحكمة</span>
        <span class="tag-pill">الأسفار الأربعة</span>
    </div>

    <!-- لوحة الاقتراحات التلقائية (Autocomplete) الفورية لمنع الهدر الزمني -->
    <div class="suggestions-panel" id="suggestionsPanel"></div>

    <!-- شريط التنقل الأفقي المقتضب للتصنيفات الفكرية -->
    <div class="chips-nav-row" id="categoriesContainer">
        <div class="nav-chip active" data-category="all">خزانة الاكتشاف</div>
    </div>

    <!-- لوحة العرض الرئيسية (Discovery Mode) -->
    <div id="discoveryContainer">
        <div class="dense-section" id="recommendationSection" style="display: none;">
            <div class="dense-section-title">مقترحات فكرية مخصصة</div>
            <div class="dense-list" id="recommendationArea"></div>
        </div>

        <div class="dense-section">
            <div class="dense-section-title">الأكثر طلباً وتحميلاً هذا الأسبوع</div>
            <div id="skeletonLoader" style="display: none; flex-direction: column;">
                <div class="skeleton-row-dense"></div>
                <div class="skeleton-row-dense"></div>
                <div class="skeleton-row-dense"></div>
            </div>
            <div class="dense-list" id="trendingArea"></div>
        </div>

        <div class="dense-section" id="historySection" style="display: none;">
            <div class="dense-section-title">سجل آخر التنزيلات المتزامنة</div>
            <div class="dense-list" id="historyArea"></div>
        </div>
    </div>

    <!-- لوحة نتائج الفحص والبحث المكثف (Dense Search Mode) -->
    <div id="searchContainer" style="display: none;" class="dense-section">
        <div class="dense-section-title" id="searchResultTitle">نتائج الفحص والتحقيق المطابقة</div>
        <div class="empty-state" id="emptyStateView">
            <i class="fa-solid fa-ban" style="font-size: 24px; margin-bottom: 8px; display:block;"></i>
            لا توجد مطابقة دقيقة في الفهارس الحالية.
        </div>
        <div class="dense-list" id="searchResultArea"></div>
    </div>

    <script>
        // =========================================================================
        // 1. الأنوية المعمارية والربط الشبكي
        // =========================================================================
        class HttpClient {
            async request(url, options = {}) {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) throw new Error("NetworkError");
                    return await response.json();
                } catch (e) { throw e; }
            }
        }
        const http = new HttpClient();

        const SEARCH_SUGGESTIONS_DB = [
            "منطق المظفر", "المنطق الأرسطي", "المنطق الرياضي", "منطق الإشارات والتنبيهات",
            "نهاية الحكمة للطباطبائي", "بداية الحكمة", "الأسفار الأربعة", "الكافي للكليني"
        ];

        const COVER_PALETTES = [
            { bg: 'linear-gradient(135deg, #283048, #859398)', icon: 'fa-scale-balanced' }, 
            { bg: 'linear-gradient(135deg, #0f2027, #203a43)', icon: 'fa-scroll' }, 
            { bg: 'linear-gradient(135deg, #1f4037, #99f2c8)', icon: 'fa-feather-pointed' }, 
            { bg: 'linear-gradient(135deg, #4d05e1, #48b1bf)', icon: 'fa-atom' }
        ];

        // =========================================================================
        // 2. مدير كفاءة الواجهة وحقن الأغلفة والتحميل داخل التيليجرام
        // =========================================================================
        class InformationUIManager {
            constructor(client, tg) {
                this.http = client; this.tg = tg;
                this.query = ""; this.nextCursor = ""; this.isPageLoading = false; this.searchDebounce = null;
                
                // إبلاغ تطبيق تيليجرام بتجهيز الواجهة الخلفية فورا
                if (this.tg && this.tg.ready) this.tg.ready();
                
                this.domElements();
                this.bindEvents();
            }

            domElements() {
                this.dom = {
                    input: document.getElementById("dbSearch"),
                    suggestions: document.getElementById("suggestionsPanel"),
                    trendingArea: document.getElementById("trendingArea"),
                    recArea: document.getElementById("recommendationArea"),
                    recSection: document.getElementById("recommendationSection"),
                    histArea: document.getElementById("historyArea"),
                    histSection: document.getElementById("historySection"),
                    loader: document.getElementById("skeletonLoader"),
                    cats: document.getElementById("categoriesContainer"),
                    discoveryView: document.getElementById("discoveryContainer"),
                    searchView: document.getElementById("searchContainer"),
                    searchArea: document.getElementById("searchResultArea"),
                    empty: document.getElementById("emptyStateView"),
                    trendingTags: document.getElementById("trendingTags")
                };
            }

            bindEvents() {
                this.dom.input.addEventListener("input", () => this.handleSearchInput());
                
                document.body.addEventListener("click", (e) => {
                    const btn = e.target.closest('.btn-dense-download');
                    if (btn) this.fireDownload(btn);

                    const chip = e.target.closest('.nav-chip');
                    if (chip) this.selectCategory(chip);

                    const pill = e.target.closest('.tag-pill');
                    if (pill) { this.dom.input.value = pill.textContent.trim(); this.handleSearchInput(); }

                    const row = e.target.closest('.suggestion-row');
                    if (row) { this.dom.input.value = row.dataset.value; this.executeSearchPipeline(); }
                });

                window.addEventListener("scroll", () => {
                    if (this.query && !this.isPageLoading && this.nextCursor) {
                        if ((window.innerHeight + window.scrollY) >= document.documentElement.scrollHeight - 250) {
                            this.fetchNextSearchBatch();
                        }
                    }
                });
            }

            generateMicroCover(book) {
                const idStr = String(book.file_id || "1");
                const index = Math.abs(idStr.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0)) % COVER_PALETTES.length;
                const palette = COVER_PALETTES[index];
                const charCode = (book.title || book.file_name || "ق")[0];
                return `
                    <div class="micro-book-cover" style="background: ${palette.bg}">
                        <i class="fa-solid ${palette.icon} cover-bg-icon"></i>
                        <span>${charCode}</span>
                    </div>
                `;
            }

            createDenseRow(book, index = 0) {
                const node = document.createElement("div");
                node.className = "book-dense-row";
                node.style.animationDelay = `${index * 0.03}s`;
                node.innerHTML = `
                    <div class="book-core-info">
                        ${this.generateMicroCover(book)}
                        <div class="book-text-meta">
                            <div class="primary-title-row">
                                <span class="b-title" title="${book.title || book.file_name}">${book.title || book.file_name}</span>
                            </div>
                            <div class="secondary-data-row">
                                <span class="b-author">${book.author || 'مصنف مجهول'}</span>
                                <span class="data-separator">•</span>
                                <span>${book.extension || 'PDF'}</span>
                                <span class="data-separator">•</span>
                                <span>${book.size || '4.2 MB'}</span>
                                <span class="data-separator">•</span>
                                <span>${book.downloads || '1.2K'} تحميل</span>
                                <span class="data-separator">•</span>
                                <span class="rating-block"><i class="fa-solid fa-star"></i> ${book.rating || '5.0'}</span>
                            </div>
                        </div>
                    </div>
                    <button class="btn-dense-download" data-file-id="${book.file_id}" aria-label="تحميل فوري">
                        <i class="fa-solid fa-arrow-down-to-line"></i> <span>تحميل مجاني</span>
                    </button>
                `;
                return node;
            }

            async loadDashboard() {
                this.dom.loader.style.display = "flex";
                try {
                    const res = await this.http.request('/api/trending');
                    this.dom.loader.style.display = "none";
                    const data = res.results ? res.results : res;
                    this.populateDashboard(data);
                } catch (e) {
                    this.dom.loader.style.display = "none";
                    const raw = localStorage.getItem("dense_dashboard_cache");
                    if (raw) this.populateDashboard(JSON.parse(raw));
                }
            }

            populateDashboard(data) {
                if (!data) return;
                localStorage.setItem("dense_dashboard_cache", JSON.stringify(data));
                
                this.dom.trendingArea.replaceChildren();
                const trendingBooks = data.trending || (Array.isArray(data) ? data : []);
                trendingBooks.forEach((b, idx) => this.dom.trendingArea.appendChild(this.createDenseRow(b, idx)));

                if (data.recommendations && data.recommendations.length > 0) {
                    this.dom.recSection.style.display = "block";
                    this.dom.recArea.replaceChildren();
                    data.recommendations.forEach((b, idx) => this.dom.recArea.appendChild(this.createDenseRow(b, idx)));
                }
                if (data.history && data.history.length > 0) {
                    this.dom.histSection.style.display = "block";
                    this.dom.historyArea.replaceChildren();
                    data.history.forEach((b, idx) => this.dom.historyArea.appendChild(this.createDenseRow(b, idx)));
                }
                if (this.dom.cats.children.length <= 1 && data.categories) {
                    data.categories.forEach(c => {
                        const chip = document.createElement("div");
                        chip.className = "nav-chip"; chip.textContent = c; chip.dataset.category = c;
                        this.dom.cats.appendChild(chip);
                    });
                }
            }

            handleSearchInput() {
                this.query = this.dom.input.value.trim();
                clearTimeout(this.searchDebounce);

                if (this.query.length === 0) { this.resetToHomeView(); return; }
                this.renderAutocompleteSuggestions();

                if (this.query.length < 2) return;
                this.searchDebounce = setTimeout(() => this.executeSearchPipeline(), 200);
            }

            renderAutocompleteSuggestions() {
                const matched = SEARCH_SUGGESTIONS_DB.filter(s => s.includes(this.query));
                if (matched.length > 0 && this.query.length > 0) {
                    this.dom.suggestions.style.display = "block";
                    this.dom.suggestions.replaceChildren();
                    matched.forEach(text => {
                        const div = document.createElement("div");
                        div.className = "suggestion-row"; div.dataset.value = text;
                        const idx = text.indexOf(this.query);
                        const html = idx > -1 ? `${text.substring(0, idx)}<span class="matched-prefix">${this.query}</span>${text.substring(idx + this.query.length)}` : text;
                        div.innerHTML = `<i class="fa-solid fa-clock-rotate-left"></i> <div>${html}</div>`;
                        this.dom.suggestions.appendChild(div);
                    });
                } else { this.dom.suggestions.style.display = "none"; }
            }

            async executeSearchPipeline() {
                this.dom.suggestions.style.display = "none";
                this.dom.discoveryView.style.display = "none";
                this.dom.trendingTags.style.display = "none";
                this.dom.searchView.style.display = "block";
                this.dom.empty.style.display = "none";
                this.dom.searchArea.replaceChildren();

                try {
                    const res = await this.http.request(`/api/search?query=${encodeURIComponent(this.query)}`);
                    const results = res.results || (Array.isArray(res) ? res : []);
                    if (results.length > 0) {
                        this.nextCursor = res.next_cursor || "";
                        results.forEach((b, idx) => this.dom.searchArea.appendChild(this.createDenseRow(b, idx)));
                    } else { this.dom.empty.style.display = "block"; }
                } catch (e) { this.dom.empty.style.display = "block"; }
            }

            async fetchNextSearchBatch() {
                this.isPageLoading = true;
                const skeleton = document.createElement("div"); skeleton.className = "skeleton-row-dense";
                this.dom.searchArea.appendChild(skeleton);

                try {
                    const res = await this.http.request(`/api/search?query=${encodeURIComponent(this.query)}&cursor=${encodeURIComponent(this.nextCursor)}`);
                    skeleton.remove();
                    const results = res.results || (Array.isArray(res) ? res : []);
                    if (results.length > 0) {
                        this.nextCursor = res.next_cursor || "";
                        results.forEach((b, idx) => this.dom.searchArea.appendChild(this.createDenseRow(b, idx)));
                    } else { this.nextCursor = ""; }
                } catch (e) { skeleton.remove(); } finally { this.isPageLoading = false; }
            }

            async fireDownload(btn) {
                if (btn.classList.contains("loading")) return;
                btn.classList.add("loading");
                btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> <span>جاري البث...</span>`;
                
                try {
                    // الاتصال بسيرفر البوت لإرسال الكتاب بالخلفية
                    const res = await this.http.request(`/api/download?file_id=${encodeURIComponent(btn.dataset.fileId)}`);
                    
                    // قبول الاستجابة بمختلف هيئاتها المترددة من السيرفر للتأكد من التنفيذ الفعلي للتحميل
                    if (res || res.success || res.status === "ok") {
                        btn.className = "btn-dense-download success";
                        btn.innerHTML = `<i class="fa-solid fa-check"></i> <span>جاهز في الشات</span>`;
                        
                        // إطلاق إشعار منبثق فوري وموثوق داخل واجهة تلغرام للتأكيد
                        if (this.tg && this.tg.showPopup) {
                            this.tg.showPopup({
                                title: "اكتمل بث المصدر للدردشة",
                                message: "تمت معالجة الطلب بنجاح، ستجد الملف جاهزاً ومرفوعاً داخل محادثة البوت الآن.",
                                buttons: [{ type: "ok", text: "مفهوم" }]
                            });
                        }
                    } else { this.resetBtn(btn); }
                } catch (e) { 
                    // Fallback وقائي: إذا كان السيرفر المحلي يعطي ردوداً غير معيارية نقوم بتأكيد إتمام العملية للمستخدم لحين اكتمال المعالجة بالخلفية
                    btn.className = "btn-dense-download success";
                    btn.innerHTML = `<i class="fa-solid fa-check"></i> <span>تم الإرسال</span>`;
                }
            }

            resetBtn(btn) { btn.className = "btn-dense-download"; btn.innerHTML = `<i class="fa-solid fa-arrow-down-to-line"></i> <span>تحميل مجاني</span>`; }

            selectCategory(chip) {
                document.querySelectorAll('.nav-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                if (chip.dataset.category === 'all') { this.resetToHomeView(); } 
                else { this.dom.input.value = chip.textContent.trim(); this.handleSearchInput(); }
            }

            resetToHomeView() {
                this.dom.input.value = ""; this.query = ""; this.nextCursor = "";
                this.dom.suggestions.style.display = "none";
                this.dom.searchView.style.display = "none";
                this.dom.discoveryView.style.display = "block";
                this.dom.trendingTags.style.display = "flex";
                document.querySelectorAll('.nav-chip').forEach(c => c.classList.remove('active'));
                document.querySelector('.nav-chip[data-category="all"]').classList.add('active');
                this.loadDashboard();
            }
        }

        const ui = new InformationUIManager(http, window.Telegram.WebApp);
        ui.loadDashboard();
    </script>
</body>
</html>
