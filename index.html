<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>مكتبة المعرفة الرقمية - واجهة الجيل الجديد</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* التناغم مع ألوان Telegram الرسمية مع Fallbacks عصرية */
        :root {
            --tg-bg: var(--telegram-bg-color, #0f141c);
            --tg-sec-bg: var(--telegram-secondary-bg-color, #171f2a);
            --tg-text: var(--telegram-text-color, #f5f6f7);
            --tg-hint: var(--telegram-hint-color, #7f8c99);
            --tg-link: var(--telegram-link-color, #2481cc);
            --accent-gradient: linear-gradient(135deg, #2481cc, #00b4db);
            --card-shadow: 0 4px 12px rgba(0, 0, 0, 0.15);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--tg-bg); color: var(--tg-text); padding: 16px; min-height: 100vh;
            line-height: 1.4;
        }

        /* رأس الصفحة الفاخر */
        .app-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
        .brand-wrapper { display: flex; align-items: center; gap: 12px; }
        .brand-icon {
            background: var(--accent-gradient); width: 42px; height: 42px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center; color: #fff; font-size: 20px; box-shadow: var(--card-shadow);
        }
        .brand-text h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
        .brand-text p { font-size: 11px; color: var(--tg-hint); }

        /* شريط البحث المطور */
        .search-container { position: relative; margin-bottom: 16px; }
        .search-input {
            width: 100%; padding: 16px 48px 16px 16px; background-color: var(--tg-sec-bg);
            border: 1px solid rgba(255, 255, 255, 0.05); border-radius: 14px; color: var(--tg-text); font-size: 15px;
            outline: none; transition: all 0.25s ease; box-shadow: var(--card-shadow);
        }
        .search-input:focus { border-color: var(--tg-link); box-shadow: 0 0 0 3px rgba(36, 129, 204, 0.2); }
        .search-container .search-icon { position: absolute; top: 50%; right: 18px; transform: translateY(-50%); color: var(--tg-hint); font-size: 16px; }

        /* الكلمات الشائعة وسجل البحث */
        .trending-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 24px; padding: 0 4px; }
        .trending-label { font-size: 11px; color: var(--tg-hint); align-self: center; margin-left: 4px; }
        .tag-pill { font-size: 11px; background: rgba(255, 255, 255, 0.05); padding: 4px 10px; border-radius: 8px; color: var(--tg-link); cursor: pointer; }

        /* التصنيفات الاحترافية بأيقونات */
        .chips-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px; margin-bottom: 28px; }
        .chips-scroll::-webkit-scrollbar { display: none; }
        .category-chip {
            background-color: var(--tg-sec-bg); border: 1px solid rgba(255, 255, 255, 0.03); color: var(--tg-text);
            padding: 10px 16px; border-radius: 12px; font-size: 13px; font-weight: 600; white-space: nowrap;
            cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all 0.2s ease;
        }
        .category-chip i { font-size: 14px; color: var(--tg-hint); }
        .category-chip.active { background: var(--accent-gradient); color: #fff; border: none; box-shadow: var(--card-shadow); }
        .category-chip.active i { color: #fff; }

        /* هيكلة الأقسام الحديثة */
        .section-wrapper { margin-bottom: 32px; }
        .section-header { font-size: 15px; font-weight: 800; color: var(--tg-text); margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
        .section-header span { display: flex; align-items: center; gap: 8px; }
        .section-header i { color: var(--tg-link); }

        /* الرف الأفقي كنمط عالي الجاذبية (Spotify Style Scroll) */
        .horizontal-shelf { display: flex; gap: 14px; overflow-x: auto; padding: 4px 4px 16px 4px; }
        .horizontal-shelf::-webkit-scrollbar { display: none; }
        
        /* بطاقة الكتاب المطورة كلياً */
        .book-card-vertical {
            background-color: var(--tg-sec-bg); border-radius: 16px; width: 140px; flex-shrink: 0;
            padding: 10px; display: flex; flex-direction: column; gap: 8px; box-shadow: var(--card-shadow); transition: transform 0.2s;
        }
        .book-card-vertical:active { transform: scale(0.97); }
        
        /* غلاف كتاب ديناميكي مولد برمجياً */
        .book-cover-art {
            width: 120px; height: 160px; border-radius: 10px; position: relative;
            display: flex; flex-direction: column; justify-content: space-between; padding: 12px;
            color: #fff; font-weight: 700; overflow: hidden; box-shadow: inset 0 -40px 40px rgba(0,0,0,0.4);
        }
        .book-cover-art .cover-bg-icon { position: absolute; bottom: -10px; left: -10px; font-size: 70px; opacity: 0.12; transform: rotate(-15deg); }
        .book-cover-art .badge-tag { font-size: 9px; text-transform: uppercase; padding: 2px 6px; background: rgba(0,0,0,0.3); border-radius: 4px; width: max-content; backdrop-filter: blur(2px); }
        .book-cover-art .mini-title { font-size: 11px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; text-shadow: 1px 1px 2px rgba(0,0,0,0.6); line-height: 1.2; }

        /* تفاصيل البيانات بتسلسل بصري سليم */
        .book-meta-block { display: flex; flex-direction: column; gap: 2px; }
        .meta-book-title { font-size: 13px; font-weight: 700; color: var(--tg-text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .meta-book-author { font-size: 11px; color: var(--tg-hint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .card-action-row { display: flex; align-items: center; justify-content: space-between; margin-top: 4px; padding-top: 6px; border-top: 1px solid rgba(255,255,255,0.03); }
        .meta-file-info { font-size: 10px; color: var(--tg-hint); }
        
        .btn-download-icon {
            width: 28px; height: 28px; border-radius: 50%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.05);
            color: var(--tg-link); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s;
        }
        .btn-download-icon.success { background: var(--accent-green) !important; color: white !important; border: none; }

        /* تصميم القائمة الطولية المرنة لنتائج البحث */
        .vertical-list { display: flex; flex-direction: column; gap: 12px; }
        .book-card-horizontal {
            display: flex; gap: 14px; background-color: var(--tg-sec-bg); border-radius: 16px; padding: 12px; box-shadow: var(--card-shadow);
        }
        .book-card-horizontal .book-cover-art { width: 75px; height: 100px; flex-shrink: 0; padding: 8px; }
        .book-card-horizontal .book-cover-art .mini-title { font-size: 9px; }
        .book-card-horizontal .horizontal-details { display: flex; flex-direction: column; justify-content: space-between; flex-grow: 1; overflow: hidden; }

        /* الهياكل العظمية الحديثة */
        .skeleton-shelf { display: flex; gap: 14px; overflow: hidden; }
        .skeleton-card { width: 140px; height: 240px; background: var(--tg-sec-bg); border-radius: 16px; animation: pulse 1.5s infinite ease-in-out; }
        @keyframes pulse { 0% { opacity: 0.6; } 50% { opacity: 1; } 100% { opacity: 0.6; } }

        .empty-state { display: none; text-align: center; padding: 48px 16px; color: var(--tg-hint); }
        .empty-state i { font-size: 40px; margin-bottom: 12px; color: var(--tg-link); }
        .offline-tag { background: #cf3c3c; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 4px; display: none; }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="brand-wrapper">
            <div class="brand-icon"><i class="fa-solid fa-graduation-cap"></i></div>
            <div class="brand-text">
                <h1>خزانة الحكمة</h1>
                <p>البوابة الرقمية لـ 1.5 مليون كتاب ومخطوطة</p>
            </div>
        </div>
        <span id="offlineTag" class="offline-tag">أوفلاين</span>
    </div>

    <div class="search-container">
        <input type="text" id="dbSearch" class="search-input" placeholder="ابحث بالعنوان، المؤلف، أو الفكرة الفلسفية...">
        <i class="fa-solid fa-magnifying-glass search-icon"></i>
    </div>
    <div class="trending-tags" id="trendingTags">
        <span class="trending-label">شائع الآن:</span>
        <span class="tag-pill">علي الوردي</span>
        <span class="tag-pill">مقدمة ابن خلدون</span>
        <span class="tag-pill">وجودية نيتشه</span>
    </div>

    <div class="chips-scroll" id="categoriesContainer">
        <div class="category-chip active" data-category="all"><i class="fa-solid fa-compass"></i> اكتشف الكل</div>
    </div>

    <div id="homeViewContainer">
        <div class="section-wrapper" id="recommendationSection" style="display: none;">
            <div class="section-header"><span><i class="fa-solid fa-wand-magic-sparkles"></i> مقترحات منسقة لاهتمامك</span></div>
            <div class="horizontal-shelf" id="recommendationArea"></div>
        </div>

        <div class="section-wrapper" id="trendingSection">
            <div class="section-header"><span><i class="fa-solid fa-fire"></i> الأكثر تحميلاً هذا الأسبوع</span></div>
            
            <div id="skeletonLoader" class="skeleton-shelf" style="display: none;">
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>

            <div class="horizontal-shelf" id="trendingArea"></div>
        </div>

        <div class="section-wrapper" id="historySection" style="display: none;">
            <div class="section-header"><span><i class="fa-solid fa-clock-rotate-left"></i> أكمل القراءة (آخر التنزيلات)</span></div>
            <div class="horizontal-shelf" id="historyArea"></div>
        </div>
    </div>

    <div id="searchViewContainer" style="display: none;" class="section-wrapper">
        <div class="section-header"><span id="searchResultTitle">نتائج الفحص والمطابقة</span></div>
        <div class="empty-state" id="emptyStateView">
            <i class="fa-solid fa-folder-open"></i>
            <p>لم نجد نتائج مطابقة لعنوان بحثك الفوري.</p>
        </div>
        <div class="vertical-list" id="searchResultArea"></div>
    </div>

    <script>
        // =========================================================================
        // 1. الأنوية المعمارية الصلبة المتبعة (Architecture Layer)
        // =========================================================================
        class TraceContext {
            constructor() { this.traceId = `tr-${Math.random().toString(36).substr(2, 9)}`; }
        }
        const globalTrace = new TraceContext();

        class HttpClient {
            async request(url, options = {}) {
                const timeoutCtrl = new AbortController();
                let signal = timeoutCtrl.signal;
                if (options.signal) {
                    if (typeof AbortSignal.any === 'function') signal = AbortSignal.any([options.signal, timeoutCtrl.signal]);
                    else options.signal.addEventListener('abort', () => timeoutCtrl.abort());
                }
                const timer = setTimeout(() => timeoutCtrl.abort(), 8000);
                try {
                    const response = await fetch(url, { ...options, signal });
                    if (!response.ok) throw new Error(`Status:${response.status}`);
                    return await response.json();
                } finally { clearTimeout(timer); }
            }
        }

        class BookRepository {
            constructor(client) { this.client = client; }
            async getDashboard() { return this.client.request('/api/trending'); }
            async search(query, cursor, signal) {
                return this.client.request(`/api/search?query=${encodeURIComponent(query)}&cursor=${encodeURIComponent(cursor)}`, { signal });
            }
            async download(fileId) { return this.client.request(`/api/download?file_id=${encodeURIComponent(fileId)}`); }
        }

        const http = new HttpClient();
        const repo = new BookRepository(http);

        // =========================================================================
        // 2. منطق توليد الأغلفة الديناميكية والمظهر الجمالي (UI Cover Generator)
        // =========================================================================
        const COVER_PALETTES = [
            { bg: 'linear-gradient(135deg, #3a6186, #89253e)', icon: 'fa-scale-balanced' }, // فلسفة / علوم
            { bg: 'linear-gradient(135deg, #4ea105, #48b1bf)', icon: 'fa-feather-pointed' }, // أدب / روايات
            { bg: 'linear-gradient(135deg, #134e5e, #71b280)', icon: 'fa-scroll' }, // تاريخ / تراث
            { bg: 'linear-gradient(135deg, #b06ab3, #4568dc)', icon: 'fa-atom' }  // تقنية / معرفة العامة
        ];

        function generateCoverHTML(book) {
            // اختيار لوحة ألوان ثابتة ومحددة برمز فريد مستخلص من قيمة الـ file_id
            const index = Math.abs(book.file_id.split('').reduce((acc, char) => acc + char.charCodeAt(0), 0)) % COVER_PALETTES.length;
            const palette = COVER_PALETTES[index];
            
            return `
                <div class="book-cover-art" style="background: ${palette.bg}">
                    <i class="fa-solid ${palette.icon} cover-bg-icon"></i>
                    <div class="badge-tag">${book.extension || 'PDF'}</div>
                    <div class="mini-title">${book.title || book.file_name}</div>
                </div>
            `;
        }

        // =========================================================================
        // 3. محرك العرض وتنسيق تجربة الـ UX وتقليم الـ DOM (Product Presentation Layer)
        // =========================================================================
        class UIManager {
            constructor(repository, tg) {
                this.repo = repository; this.tg = tg;
                this.query = ""; this.nextCursor = ""; this.isPageLoading = false; this.searchDebounce = null;
                
                this.domElements();
                this.bindEvents();
            }

            domElements() {
                this.dom = {
                    input: document.getElementById("dbSearch"),
                    trendingArea: document.getElementById("trendingArea"),
                    recArea: document.getElementById("recommendationArea"),
                    recSection: document.getElementById("recommendationSection"),
                    histArea: document.getElementById("historyArea"),
                    histSection: document.getElementById("historySection"),
                    loader: document.getElementById("skeletonLoader"),
                    cats: document.getElementById("categoriesContainer"),
                    homeContainer: document.getElementById("homeViewContainer"),
                    searchContainer: document.getElementById("searchViewContainer"),
                    searchArea: document.getElementById("searchResultArea"),
                    empty: document.getElementById("emptyStateView"),
                    badge: document.getElementById("offlineTag"),
                    trendingTags: document.getElementById("trendingTags")
                };
            }

            bindEvents() {
                this.dom.input.addEventListener("input", () => this.handleSearchInput());
                
                // تفويض كامل ومطلق للأحداث تماشياً مع معايير الأداء العالي حظراً لتسريبات المستمعين
                document.body.addEventListener("click", (e) => {
                    const btn = e.target.closest('.btn-download-icon');
                    if (btn) this.fireDownload(btn);

                    const chip = e.target.closest('.category-chip');
                    if (chip) this.selectCategory(chip);

                    const tag = e.target.closest('.tag-pill');
                    if (tag) { this.dom.input.value = tag.textContent; this.handleSearchInput(); }
                });

                // معالجة الـ Infinite Scroll لنتائج البحث الطولية مع ميزة الـ Pruning لسلامة المعالج
                window.addEventListener("scroll", () => {
                    if (this.query && !this.isPageLoading && this.nextCursor) {
                        if ((window.innerHeight + window.scrollY) >= document.documentElement.scrollHeight - 300) {
                            this.fetchNextSearchBatch();
                        }
                    }
                });
            }

            createVerticalCard(book) {
                const node = document.createElement("div");
                node.className = "book-card-vertical";
                node.innerHTML = `
                    ${generateCoverHTML(book)}
                    <div class="book-meta-block">
                        <div class="meta-book-title">${book.title || book.file_name}</div>
                        <div class="meta-book-author">${book.author || 'مؤلف مجهول'}</div>
                    </div>
                    <div class="card-action-row">
                        <span class="meta-file-info">${book.size || '3.2 MB'}</span>
                        <button class="btn-download-icon" data-file-id="${book.file_id}" aria-label="تحميل الكتاب"><i class="fa-solid fa-arrow-down"></i></button>
                    </div>
                `;
                return node;
            }

            createHorizontalCard(book) {
                const node = document.createElement("div");
                node.className = "book-card-horizontal";
                node.innerHTML = `
                    ${generateCoverHTML(book)}
                    <div class="horizontal-details">
                        <div class="book-meta-block">
                            <div class="meta-book-title" style="white-space: normal; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;">${book.title || book.file_name}</div>
                            <div class="meta-book-author" style="margin-top: 4px;">المؤلف: ${book.author || 'ابن خلدون'}</div>
                            <div class="meta-file-info" style="margin-top: 2px;">سنة النشر: ${book.year || 'تحقيق حديث'} | الحجم: ${book.size || '4.1 MB'}</div>
                        </div>
                        <div class="card-action-row" style="border: none; padding: 0; margin: 0;">
                            <span class="meta-file-info" style="color: var(--tg-link)">تنزيل فوري متزامن</span>
                            <button class="btn-download-icon" data-file-id="${book.file_id}"><i class="fa-solid fa-arrow-down"></i></button>
                        </div>
                    </div>
                `;
                return node;
            }

            async loadDashboard() {
                this.dom.loader.style.display = "flex";
                try {
                    const res = await this.repo.getDashboard();
                    this.dom.loader.style.display = "none";
                    this.populateDashboard(res.results);
                    localStorage.setItem("prod_ux_cache", JSON.stringify(res.results));
                } catch (e) {
                    this.dom.loader.style.display = "none";
                    const fallback = localStorage.getItem("prod_ux_cache");
                    if (fallback) {
                        this.dom.badge.style.display = "inline-block";
                        this.populateDashboard(JSON.parse(fallback));
                    }
                }
            }

            populateDashboard(data) {
                this.dom.trendingArea.replaceChildren();
                data.trending.forEach(b => this.dom.trendingArea.appendChild(this.createVerticalCard(b)));

                if (data.recommendations && data.recommendations.length > 0) {
                    this.dom.recSection.style.display = "block";
                    this.dom.recArea.replaceChildren();
                    data.recommendations.forEach(b => this.dom.recArea.appendChild(this.createVerticalCard(b)));
                }
                if (data.history && data.history.length > 0) {
                    this.dom.histSection.style.display = "block";
                    this.dom.historyArea.replaceChildren();
                    data.history.forEach(b => this.dom.historyArea.appendChild(this.createVerticalCard(b)));
                }
                if (this.dom.cats.children.length <= 1 && data.categories) {
                    data.categories.forEach(c => {
                        const chip = document.createElement("div");
                        chip.className = "category-chip";
                        chip.innerHTML = `<i class="fa-solid fa-book-open"></i> ${c}`;
                        chip.dataset.category = c;
                        this.dom.cats.appendChild(chip);
                    });
                }
            }

            handleSearchInput() {
                clearTimeout(this.searchDebounce);
                this.query = this.dom.input.value.trim();

                if (this.query.length < 2) {
                    if (this.query.length === 0) this.resetToHome();
                    return;
                }
                this.searchDebounce = setTimeout(() => this.executeSearchPipeline(), 250);
            }

            async executeSearchPipeline() {
                this.dom.homeContainer.style.display = "none";
                this.dom.trendingTags.style.display = "none";
                this.dom.searchContainer.style.display = "block";
                this.dom.empty.style.display = "none";
                this.dom.searchArea.replaceChildren();

                try {
                    const res = await this.repo.search(this.query, "");
                    if (res.success && res.results.length > 0) {
                        this.nextCursor = res.next_cursor;
                        res.results.forEach(b => this.dom.searchArea.appendChild(this.createHorizontalCard(b)));
                    } else {
                        this.dom.empty.style.display = "block";
                    }
                } catch (e) {}
            }

            async fetchNextSearchBatch() {
                this.isPageLoading = true;
                try {
                    const res = await this.repo.search(this.query, this.nextCursor);
                    if (res.success && res.results.length > 0) {
                        this.nextCursor = res.next_cursor;
                        res.results.forEach(b => this.dom.searchArea.appendChild(this.createHorizontalCard(b)));
                        
                        // تطبيق هندسة الـ DOM Pruning لحظر تضخم الـ DOM وتأمين الخفة الاستثنائية للهواتف
                        if (this.dom.searchArea.children.length > 50) {
                            for (let i = 0; i < 15; i++) this.dom.searchArea.removeChild(this.dom.searchArea.firstChild);
                        }
                    } else {
                        this.nextCursor = "";
                    }
                } finally { this.isPageLoading = false; }
            }

            async fireDownload(btn) {
                if (btn.classList.contains("loading")) return;
                btn.classList.add("loading");
                btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i>`;
                
                try {
                    const res = await this.repo.download(btn.dataset.fileId);
                    if (res.success) {
                        btn.className = "btn-download-icon success";
                        btn.innerHTML = `<i class="fa-solid fa-check"></i>`;
                        if (this.tg.showPopup) {
                            this.tg.showPopup({ title: "اكتمل البث للمحادثة", message: "تم إرسال الكتاب المحدد إلى شات البوت الخاص بك في الخلفية بنجاح.", buttons: [{type: "ok"}] });
                        }
                    } else { this.resetBtn(btn); }
                } catch (e) { this.resetBtn(btn); }
            }

            resetBtn(btn) { btn.className = "btn-download-icon"; btn.innerHTML = `<i class="fa-solid fa-arrow-down"></i>`; }
            
            selectCategory(chip) {
                document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
                chip.classList.add('active');
                if (chip.dataset.category === 'all') { this.resetToHome(); } 
                else { this.dom.input.value = chip.textContent.trim(); this.handleSearchInput(); }
            }

            resetToHome() {
                this.dom.input.value = ""; this.query = ""; this.nextCursor = "";
                this.dom.searchContainer.style.display = "none";
                this.dom.homeContainer.style.display = "block";
                this.dom.trendingTags.style.display = "flex";
                document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
                document.querySelector('.category-chip[data-category="all"]').classList.add('active');
                this.loadDashboard();
            }
        }

        // الإقلاع المركزي الفوري للواجهة المنتجة
        const ui = new UIManager(repo, window.Telegram.WebApp);
        ui.loadDashboard();
    </script>
</body>
</html>
